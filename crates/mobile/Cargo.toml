[package]
name = "isyncyou-mobile"
description = "Standalone Android client (#89): embeds the iSyncYou engine in-process and serves the web UI over loopback, reached by the app's WebView. JNI entry for Kotlin."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
name = "isyncyou_mobile"
crate-type = ["cdylib"]

[dependencies]
isyncyou-core = { path = "../core" }
isyncyou-webui = { path = "../../gui/webui", default-features = false }
isyncyou-app-host = { path = "../app-host", default-features = false }
isyncyou-engine = { path = "../engine", default-features = false }
jni = "0.22"

[features]
# Android ships plain-store (bundled sqlite, no OpenSSL/SQLCipher) — see #89 P0.
# In the host workspace build the daemon also pulls these crates with
# `encrypted-store`, so they unify to SQLCipher there (fine on Linux); the isolated
# `cargo ndk -p isyncyou-mobile` build has no daemon, so it stays plain.
default = ["plain-store"]
plain-store = [
    "isyncyou-webui/plain-store",
    "isyncyou-app-host/plain-store",
    "isyncyou-engine/plain-store",
]
encrypted-store = [
    "isyncyou-webui/encrypted-store",
    "isyncyou-app-host/encrypted-store",
    "isyncyou-engine/encrypted-store",
]

[dev-dependencies]
tempfile = "3"
