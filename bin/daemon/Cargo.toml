[package]
name = "isyncyou-daemon"
description = "iSyncYou engine daemon: serves the local web UI/API (graph/sync/store)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "isyncyoud"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
isyncyou-core = { path = "../../crates/core" }
isyncyou-webui = { path = "../../gui/webui" }
isyncyou-engine = { path = "../../crates/engine" }
isyncyou-store = { path = "../../crates/store" }
isyncyou-pathmap = { path = "../../crates/pathmap" }
isyncyou-graph = { path = "../../crates/graph", features = ["http"] }
isyncyou-dbus-status = { path = "../../crates/dbus-status" }
