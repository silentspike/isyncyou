[package]
name = "isyncyou-daemon"
description = "iSyncYou engine daemon: serves the local web UI/API (graph/sync/store)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "isyncyoud"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
isyncyou-core = { path = "../../crates/core" }
isyncyou-webui = { path = "../../gui/webui" }
isyncyou-engine = { path = "../../crates/engine" }
isyncyou-store = { path = "../../crates/store" }
isyncyou-pathmap = { path = "../../crates/pathmap" }
isyncyou-graph = { path = "../../crates/graph", features = ["http"] }
isyncyou-dbus-status = { path = "../../crates/dbus-status" }
# Event-driven sync accelerator (#331): watch each sync root and wake the sync
# loop early on local changes. Cross-platform (inotify; fanotify is Linux-only
# and cfg-gated inside the crate).
isyncyou-change-source = { path = "../../crates/change-source" }

# FUSE placeholder mount is Linux-only; never pulled into a Windows build.
# (Desktop toasts use the system `notify-send`, no extra crate.)
[target.'cfg(target_os = "linux")'.dependencies]
isyncyou-fuse = { path = "../../crates/fuse" }
# Live delta into the store for the mount's cloud refresh (#478 P4).
isyncyou-connectors = { path = "../../crates/connectors", features = ["http"] }
