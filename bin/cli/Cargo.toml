[package]
name = "isyncyou-cli"
description = "iSyncYou CLI (status/sync/pause/restore/verify/doctor)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "isyncyou"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde_json = { workspace = true }
isyncyou-core = { path = "../../crates/core" }
isyncyou-store = { path = "../../crates/store" }
isyncyou-pathmap = { path = "../../crates/pathmap" }
isyncyou-connectors = { path = "../../crates/connectors", features = ["http"] }
isyncyou-graph = { path = "../../crates/graph", features = ["http"] }
isyncyou-engine = { path = "../../crates/engine" }
isyncyou-pbs = { path = "../../crates/pbs" }
isyncyou-webui = { path = "../../gui/webui" }
isyncyou-change-source = { version = "0.1.0", path = "../../crates/change-source" }

# FUSE placeholder mount is Unix-only (fuser/libc); the `mount` command is gated out
# on other targets (e.g. Windows builds).
[target.'cfg(unix)'.dependencies]
isyncyou-fuse = { path = "../../crates/fuse" }
