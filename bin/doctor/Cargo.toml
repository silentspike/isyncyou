[package]
name = "isyncyou-doctor"
description = "Standalone minimal-dependency recovery doctor."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[[bin]]
name = "isyncyou-doctor"
path = "src/main.rs"

# Deliberately minimal dependencies: the doctor must run even when the rest of
# the install is broken.
[dependencies]
isyncyou-doctor-lib = { path = "../../crates/doctor-lib" }
