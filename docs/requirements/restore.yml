# Restore requirements — traceable to ADR-001 and to tests.
# Checked by tools/check_traceability.py.
requirements:
  - id: REQ-RST-001
    title: Cloud restore is opt-in
    statement: >
      Restore operations that create items in the cloud must be disabled by default
      and require an explicit configuration opt-in.
    rationale: >
      Cloud restore mutates the user's real mailbox/calendar. While the crash-safe
      ledger is incomplete, the safe default is off.
    status: implemented
    design: docs/adr/001-restore-semantics.md
    acceptance:
      - The default configuration has cloud_restore_enabled = false.
      - A configuration that omits the [restore] table stays off.
      - engine::restore_cloud refuses before any store access or network call when off.
      - The CLI refuses a cloud restore at the boundary when the flag is off.
    verified_by:
      - test: restore_cloud_refuses_when_disabled_by_default
      - test: cloud_restore_stays_off_when_omitted_from_toml
      - test: cloud_restore_blocked_when_flag_off_at_cli

  - id: REQ-RST-002
    title: Local-file restore is always available and never gated
    statement: >
      Recovering an archived item's body to a local file must work without a token,
      without network access, and regardless of the cloud-restore gate.
    status: implemented
    design: docs/adr/001-restore-semantics.md
    acceptance:
      - restore --to-local recovers the exact archived bytes to a human-named file.
      - It works for every service that has an archived body.
    verified_by:
      - test: restore_to_local_recovers_an_archived_item

  - id: REQ-RST-003
    title: A crash between the Graph write and the local record must not duplicate
    statement: >
      If the process dies, the network drops, or the token expires after the Graph
      create but before the local record, recovery must produce exactly one cloud
      item — never a duplicate, never a loss.
    rationale: The two steps are not atomic; correctness must come from the retry.
    status: implemented
    design: docs/adr/001-restore-semantics.md
    note: >
      The recovery logic is wired into the live mail restore path and proven against
      a non-idempotent fake mailbox; the marker probe is live-confirmed against the
      test account (tools/live_restore_probe.py: Graph preserves a posted Message-ID
      and the internetMessageId $filter finds it). cloud_restore_enabled stays off by
      default as a deliberate opt-in for a destructive operation.
    acceptance:
      - Crash-matrix point C4 (after POST, before local record) yields exactly one item.
      - Recovery reconciles by marker instead of blind-retrying.
    verified_by:
      - test: c4_crash_after_post_before_record_no_duplicate
      - test: crash_after_post_landed_does_not_duplicate

  - id: REQ-RST-004
    title: Restore retries are idempotent
    statement: >
      Re-attempting a restore of identical content must be recognised as the same
      operation (content-derived HMAC-SHA256 key + UNIQUE(account, idempotency_key)),
      not as a new create.
    status: implemented
    design: docs/adr/001-restore-semantics.md
    acceptance:
      - The content-derived key is deterministic and per-field sensitive.
      - Crash-matrix point C6 (concurrent identical attempt) yields exactly one item.
      - A repeat of identical content returns the same id without a second create.
    verified_by:
      - test: key_is_deterministic_and_hex
      - test: restore_op_idempotency_key_is_unique_per_account
      - test: c6_concurrent_identical_key_is_rejected_by_ledger
      - test: happy_path_creates_one_and_is_idempotent_on_repeat

  - id: REQ-RST-005
    title: In-flight restores recover automatically on daemon start
    statement: >
      On start the daemon must drive every non-terminal restore operation to a
      terminal state (reconcile or resume) before accepting new restore work.
    status: implemented
    design: docs/adr/001-restore-semantics.md
    note: >
      The daemon runs recovery before serving; an account with pending ops but no
      cached write token is logged and retried next start.
    acceptance:
      - Operations in preflight_checked / committing / failed_after_graph_commit are
        reconciled by the per-service probe at startup.
    verified_by:
      - test: boot_recovery_reconciles_a_pending_op_without_creating

  - id: REQ-RST-006
    title: Non-ledger cloud restore is refused, not run unsafely
    statement: >
      Cloud-mutating restore for a service whose path is not yet crash-safe
      (ledger-backed) must be refused — never executed via a direct, non-crash-safe
      POST. Only mail qualifies today.
    rationale: A direct POST can duplicate the item on a mid-restore crash (ADR-001).
    status: implemented
    design: docs/adr/001-restore-semantics.md
    acceptance:
      - The engine refuses a non-mail cloud restore before any store/network access.
      - The CLI refuses before resolving a token.
      - The daemon web-UI handler refuses before resolving a token.
    verified_by:
      - test: restore_cloud_refuses_non_mail_until_ledger_migrated
      - test: non_mail_cloud_restore_refuses_before_token_lookup
      - test: restore_handler_refuses_non_mail_before_token_lookup

  - id: REQ-RST-007
    title: Restore write scopes use the personal-account OneNote scope
    statement: >
      The restore/write OAuth scope set must request delegated Notes.ReadWrite for
      OneNote page re-create capability, and must not request the admin-only
      Notes.ReadWrite.All scope that personal Microsoft accounts cannot grant.
    rationale: >
      Plan §11 corrected the OneNote write scope from Notes.ReadWrite.All to
      Notes.ReadWrite; requesting the wrong scope makes personal-account restore
      setup impossible.
    status: implemented
    acceptance:
      - RESTORE_SCOPES contains Notes.ReadWrite.
      - RESTORE_SCOPES does not contain Notes.ReadWrite.All.
    verified_by:
      - test: restore_scopes_use_delegated_onenote_write_scope

  - id: REQ-RST-008
    title: Personal-account contact restore does not attempt unsupported photo upload
    statement: >
      Contact photos may be archived locally for inspection/export, but Personal
      Microsoft account contact restore must not attempt to post photo metadata or
      upload a contact photo because Microsoft Graph does not support contact-photo
      update for delegated personal accounts.
    status: implemented
    acceptance:
      - Contact create payloads include writable contact fields.
      - Contact create payloads drop photo objects and photo sidecar metadata.
      - The restore fidelity matrix documents the Graph personal-account limitation.
    verified_by:
      - test: sanitize_contact_drops_photo_fields_for_personal_account_restore

  - id: REQ-RST-009
    title: OneNote resource restore uses multipart page-create payloads
    statement: >
      OneNote page restore with archived binary resources must use Microsoft
      Graph's multipart page-create shape: a Presentation HTML part that references
      binary parts by name, plus separate image/file parts with validated headers.
    status: implemented
    acceptance:
      - Resource-bearing page restore calls the multipart page-create path.
      - Empty-resource page restore keeps using the plain HTML path.
      - The multipart body contains a Presentation part and binary data parts.
      - Multipart part names and content types reject header injection.
    verified_by:
      - test: restore_page_with_resources_uses_multipart_parts
      - test: restore_page_uses_plain_html_when_no_resources
      - test: onenote_multipart_body_uses_presentation_and_binary_parts
      - test: onenote_multipart_body_rejects_header_injection
