# Android delivery-pipeline requirements (#90, Workstream D).
# Implemented for 1.0: the Android app is a full 1.0 component. The release keystore +
# signing passwords + Firebase config are user-provided CI secrets (never generated or
# committed here). ADR-005 (docs/adr/005-android-build-system.md) fixes the build
# system; D1 (node --check + path filter, #87) shipped; D2–D6 (REQ-AND-002..007) are
# implemented in release.yml (android-apk) + pr-staging.yml (android-emulator-smoke) +
# docs/android-distribution.md. Checked by tools/check_traceability.py.
requirements:
  - id: REQ-AND-001
    title: PR build gate — the APK must build before reaching production
    statement: >
      The `android-build` job on the staging PR gate builds the debug APK (JDK17 +
      Android SDK + the pinned NDK + `./gradlew :app:assembleDebug`, which also runs
      the cargoNdkBuild cross-compile) on every staging PR, unconditionally, on
      github-hosted ubuntu-latest (self-hosted runners are forbidden for the public
      repo). It is token-free (assembleDebug needs no Firebase config) and feeds the
      staging-pass aggregator, so a build failure blocks promotion to main.
    status: implemented
    acceptance:
      - Every staging PR runs the android-build job (unconditional).
      - A failing `./gradlew :app:assembleDebug` fails staging-pass.
      - The job runs on ubuntu-latest, never a self-hosted runner.
    verified_by:
      - file: .github/workflows/pr-staging.yml
  - id: REQ-AND-002
    title: Version the APK from the RC, not a literal
    statement: >
      versionName and versionCode are injected at build time from the workspace
      version plus the CI run number, replacing the literal "1"/"0.1" fallback in
      android/app/build.gradle.kts, so every RC artifact is uniquely identifiable.
    status: implemented
    acceptance:
      - versionName matches the workspace version of the built commit.
      - versionCode is monotonic across RC builds (derived from the run number).
      - No literal version remains in the manifest at build time.
    verified_by:
      - file: android/app/build.gradle.kts
      - file: .github/workflows/release.yml
  - id: REQ-AND-003
    title: Release signing uses a user-provided keystore
    statement: >
      The release build path signs the APK with a release keystore supplied by the
      user as GitHub Actions secrets (keystore base64 + passwords). The keystore is
      NEVER generated or committed in-repo. Debug builds keep the throwaway
      "pass:android" debug key.
    status: implemented
    acceptance:
      - The release build consumes keystore material only from CI secrets.
      - No keystore or password is committed to the repo.
      - A missing release secret fails the release build with a clear message.
    verified_by:
      - file: android/app/build.gradle.kts
      - file: .github/workflows/release.yml
  - id: REQ-AND-004
    title: Emulator smoke E2E — the APK boots and the WebView loads
    statement: >
      A CI job runs the debug APK on android-emulator-runner (KVM x86_64) and asserts
      the APK installs, launches and the process stays alive (no crash), with the engine
      .so packaged. The embedded-engine WebView *render* of the bundled UI is verified on
      a physical device and a local CI-matching emulator — the headless GitHub-hosted
      runner emulator does not reliably bring up the WebView, so the CI job records that
      render best-effort rather than gating on it.
    status: implemented
    acceptance:
      - The emulator job installs and launches the APK and the process stays alive (no crash).
      - The engine .so for the emulator ABI is present in the APK.
      - The embedded-engine WebView shell render is verified on a physical device + a local emulator (best-effort in the headless runner job).
      - The android-emulator-runner action is SHA-pinned (REQ-AND-007).
    verified_by:
      - file: .github/workflows/pr-staging.yml
      - file: android/app/src/main/kotlin/com/silentspike/isyncyou/MainActivity.kt
  - id: REQ-AND-005
    title: RC promotion is build-once, promote-many
    statement: >
      release.yml builds the signed APK once (the android-apk job) and attaches it to
      the v1.0.0-rc.<run> prerelease; a stable tag reuses the byte-identical APK from
      the matching RC rather than rebuilding, so the bytes shipped to users are exactly
      the bytes tested.
    status: implemented
    acceptance:
      - The APK is built once per RC and attached to the prerelease.
      - The promoted tag release reuses the identical artifact (same checksum).
    verified_by:
      - file: .github/workflows/release.yml
  - id: REQ-AND-006
    title: OTA distribution via GitHub Releases + Obtainium
    statement: >
      The APK ships as a GitHub Release asset consumed by Obtainium. No Play Store and
      no paid distribution channel. The dev->staging->main cascade is a byte-identical
      tree overlay, so it produces one rolling RC prerelease stream (the "edge" track,
      filling nightly+beta) plus the stable track of version tags — not three separate
      per-branch APK streams. docs/android-distribution.md documents both Obtainium
      tracks.
    status: implemented
    acceptance:
      - The APK is published as a Release asset on every release.
      - Obtainium can resolve and update from the Release feed (filter + config documented).
      - Two tracks are documented — edge (RC prereleases) and stable (version tags).
    verified_by:
      - file: docs/android-distribution.md
      - file: .github/workflows/release.yml
  - id: REQ-AND-007
    title: All new CI actions are SHA-pinned
    statement: >
      Every third-party GitHub Action added for the Android pipeline is pinned to a
      full commit SHA (not a moving tag), per REQ-OPS-004, to keep the supply chain
      reproducible.
    status: implemented
    acceptance:
      - No Android-pipeline workflow references an action by a floating tag.
      - Each action reference is a 40-char commit SHA.
    verified_by:
      - file: .github/workflows/release.yml
      - file: .github/workflows/pr-staging.yml

  # --- Push notifications (#576). The transport + direct-trigger half of ADR-006 is
  # implemented and device-verified; the public-webhook relay half stays planned (R2).
  - id: REQ-AND-008
    title: FCM HTTP v1 sender authenticates with a service-account
    statement: >
      The daemon sends device notifications via Firebase Cloud Messaging HTTP v1: it
      parses a Google service-account, signs an RS256 JWT with the account's RSA key,
      exchanges it for a short-lived OAuth2 access token, and POSTs the message. The
      private key and the access token are secrets and are never logged. The sender is
      the FCM implementation behind the swappable PushProvider boundary (ADR-006).
    status: implemented
    design: docs/adr/006-push-relay.md
    acceptance:
      - A service-account JSON parses into its client_email/private_key/token_uri/project_id.
      - A PKCS#8 PEM private key decodes to DER for signing.
      - The JWT assertion is base64url-unpadded encoded.
      - A live send returns an FCM message name (ignored test; run with real credentials).
    verified_by:
      - test: parses_service_account_fields
      - test: pem_strips_headers_and_decodes
      - test: b64url_is_unpadded_urlsafe
      - test: live_fcm_send
  - id: REQ-AND-009
    title: Device push tokens register through a capability-gated endpoint
    statement: >
      The native shell reports this device's FCM registration token to the web UI via a
      JS bridge; the UI registers it at POST /api/v1/push/register, which requires the
      push capability token, deduplicates, and persists the token next to the account
      archive. Without a push handler (read-only serve) the route is refused 404.
    status: implemented
    design: docs/adr/006-push-relay.md
    acceptance:
      - Registration without the capability token is rejected 401 and stores nothing.
      - Registration with the capability token stores the token; a repeat is deduped.
      - An empty token is rejected 400.
      - With no push handler wired, the route 404s before any gate.
    verified_by:
      - test: push_register_needs_cap_token_and_records
      - test: push_register_rejects_empty_token
      - test: push_routes_refused_without_a_handler
  - id: REQ-AND-010
    title: A completed backup notifies the phone when new content was archived
    statement: >
      After a backup pass, the daemon sends a native notification summarizing the newly
      archived content ("N emails, M events backed up"), with correct singular/plural
      per service and a stable join order. A pass that archived nothing is silent.
    status: implemented
    design: docs/adr/006-push-relay.md
    acceptance:
      - Zero new items produces no notification.
      - One vs many items reads singular vs plural per service.
      - Multiple services join in a stable order in one notification.
    verified_by:
      - test: backup_delta_notification_text

  # --- Standalone "live companion" APK (#89). The app embeds the real Rust engine
  # in-process and serves the web UI over loopback — no desktop daemon. Supersedes the
  # daemon-less direct-Graph-JS direction (ADR-003); see ADR-005 for the chosen path.
  - id: REQ-AND-011
    title: The standalone app embeds the engine and serves the UI over loopback
    statement: >
      A native library (libisyncyou_mobile.so) runs the real iSyncYou engine in the
      app process and serves the web UI on an OS-assigned loopback port; the WebView
      loads http://127.0.0.1:<port>/. start is idempotent (Activity recreation reuses
      the running port) and panic-isolated (a request panic cannot kill the app).
    status: implemented
    acceptance:
      - Starting the engine binds a real loopback port.
      - A second start returns the same port (no double-bind).
      - The session token is set before serving.
    verified_by:
      - test: start_engine_binds_a_port_and_is_idempotent
  - id: REQ-AND-012
    title: The mobile loopback data API is fully session-token gated
    statement: >
      Because any app on the device can reach 127.0.0.1, every /api/v1/* route in the
      mobile profile requires an unguessable per-process session token (header, _st
      query, or loopback cookie) and returns 401 without it; the static shell stays
      open so the WebView can bootstrap. The desktop daemon is unaffected (gate off).
    status: implemented
    acceptance:
      - Without the token, data routes return 401 over HTTP.
      - A valid header / _st query / cookie passes; a wrong one is rejected.
      - The static shell (`/`, `/app.js`) stays reachable without the token.
    verified_by:
      - test: session_token_gates_data_routes_over_http
      - test: session_gate_requires_token_on_data_routes
  - id: REQ-AND-013
    title: The mobile profile is a cache, never a backup-of-record (restore off)
    statement: >
      The phone is a live companion; the laptop holds the backup. build_live_router
      omits the restore and outbound-share handlers, so those routes 404 on mobile and
      the UI hides every restore action (no restore capability token is injected). The
      UI wording reads "cached on this device", not "backup".
    status: implemented
    acceptance:
      - A POST to /api/v1/restore or /api/v1/share is 404 in the mobile router.
      - A wired live-write route is reached (cap-gated 401), proving omission is selective.
    verified_by:
      - test: mobile_live_router_omits_restore_and_share
  - id: REQ-AND-014
    title: A single device-code login fills the on-device cache
    statement: >
      A fresh phone signs in once (device-code, write/restore scopes). The read-only
      cache-refresh resolves reads via that write/restore token (its *.ReadWrite scopes
      are read-capable), so the local store fills without a separate read login.
    status: implemented
    acceptance:
      - The cache-refresh token resolver prefers the read token, else the write token.
      - With neither cached it surfaces the write-token error (proving the fallback ran).
    verified_by:
      - test: cache_refresh_token_prefers_read_then_falls_back_to_write
  - id: REQ-AND-015
    title: No Google service-account ships in the APK
    statement: >
      The daemon's FCM push *sender* (which holds the Firebase service-account) is
      never wired into the standalone engine — only the native FCM *receiver* remains.
      The embedded mobile crate depends on no push sender, so no service-account or
      secret is packaged in the APK.
    status: implemented
    design: docs/adr/006-push-relay.md
    acceptance:
      - The mobile crate wires no push sender / service-account.
      - The built APK contains no firebase-service-account / secret file.
    verified_by:
      - file: crates/mobile/src/lib.rs
