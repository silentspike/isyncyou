      - test: agent_provider_selection_uses_stored_codex_oauth_credential
      - test: credential_store_preferred_over_desktop_cli_fallback
      - test: corrupt_product_credential_does_not_fall_through_to_local_cli
      - test: corrupt_product_credential_streams_error_and_done_error
      - test: expired_product_credential_streams_error_and_done_error
      - test: expired_product_credential_refresh_preserves_product_origin
      - test: experimental_local_cli_does_not_satisfy_product_harness_readiness
      - test: product_harness_requires_encrypted_app_oauth_credential
      - test: product_oauth_config_rejects_endpoint_client_scope_override
      - test: claude_sse_event_returns_text_delta_immediately
