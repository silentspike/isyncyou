  - id: REQ-AGENT-011
    title: Assistant UI streams answers, cites sources, and gates destructive actions
    statement: >
      The WebUI Assistant tab is available on desktop and mobile when the agent
      capability is enabled. It streams typed AgentStreamHub events into a
      transcript, renders source-ID citations as same-origin item links, renders
      confirmation_required events as PendingAction cards whose Confirm request
      includes the one-time token and action_hash, exposes model and usage
      status, and requires explicit provider-egress consent before setup or use.
      (S-AG.7, #622)
    status: implemented
    design: docs/adr/007-agent-architecture.md
    acceptance:
      - Assistant appears in desktop and mobile primary navigation only when the agent capability is enabled.
      - Streaming token, tool, result, search, pending, error, and done events render as typed UI rows without external WebView network requests.
      - Source citations are source-ID based and same-origin clickable.
      - PendingAction cards are the only UI path to destructive confirmation, and Confirm posts pending/token/action_hash exactly once after the user clicks.
      - Setup requires explicit provider-egress consent and stores no secrets in browser storage.
      - Model selection is status-driven, and the usage chip is honest when usage data is unavailable.
    verified_by:
      - test: assistant_nav_is_services_entry_and_cap_gated
      - test: assistant_stream_renderer_handles_full_event_contract
      - test: assistant_citations_are_typed_same_origin_and_deduped
      - test: assistant_pending_action_cards_post_confirm_cancel_without_dom_secrets
      - test: assistant_model_picker_and_usage_chip_are_status_driven
      - test: assistant_setup_consent_is_required_and_non_secret
      - file: tools/agent-ui-smoke.mjs
      - file: docs/evidence/artifacts/issue-622/agent-ui-smoke.json
      - file: docs/evidence/artifacts/issue-622/desktop-assistant.png
      - file: docs/evidence/artifacts/issue-622/mobile-assistant.png
  - id: REQ-AGENT-012
    title: Confirmed desktop Agent operations reuse existing M365 runtime paths
    statement: >
      On desktop, restore-local runs as a controlled local restore, while backup,
      restore-cloud, live-write, and share execute only after a valid PendingAction
      confirmation. Confirmed operations reuse the existing daemon, engine, writer,
      store, and ledger-backed M365 paths; mobile destructive Agent execution remains
      disabled until the mobile security/job stories land. (S-AG.9, #624)
    status: implemented
    design: docs/adr/007-agent-architecture.md
    acceptance:
      - RestoreLocal writes archived bytes only under a controlled restore root.
      - Destructive operations do not run before one-time confirmation.
      - Confirmed backup, restore-cloud, live-write, and share route through existing app-host/engine runtime paths.
      - Mobile destructive Agent confirmation fails closed for #624.
      - Audit/API/evidence summaries are redacted and do not contain raw bodies, share URLs, OAuth material, or provider tokens.
    verified_by:
      - test: restore_local_writes_archived_body_to_controlled_restore_root
      - test: agent_backup_confirm_runs_refresh_cache_and_records_backup_run
      - test: agent_restore_cloud_confirm_routes_to_ledger_restore
      - test: agent_live_write_mail_set_read_routes_existing_writer
      - test: agent_share_link_confirm_routes_through_ledger_handler
      - test: agent_confirm_mobile_policy_refuses_before_mutation
      - test: agent_confirm_revalidates_action_before_execution
      - test: agent_confirm_result_summary_is_json_and_redacted
      - file: docs/evidence/issue-624-manifest.json
  - id: REQ-AGENT-013
    title: Network-critical product OAuth and streamed turns remain diagnosable on Android
    statement: >
      Android product OAuth, explicit credential refresh, and active streamed Agent turns
      acquire an acknowledged, bounded dataSync foreground-service lease before their
      network-critical work. A session- and capability-gated preflight returns only closed,
      redacted diagnostic codes. Credential status is network-free; an explicit refresh
      either atomically persists a complete encrypted product credential or returns a
      reconnect-required error without local fallback or FakeProvider success. (S-AG.15, #640)
    status: implemented
    design: docs/adr/007-agent-architecture.md
    acceptance:
      - Foreground guards are service-owned, reason-bound, bounded, and survive Activity recreation.
      - Preflight input is provider/purpose allowlisted, unauthenticated, bounded, and returns no host, URL, token, IP, or raw transport text.
      - Mobile preflight consumes a one-shot native guard/session-bound snapshot; WebUI cannot supply raw device state.
      - Status checks do not refresh credentials; explicit refresh persists only a complete encrypted product credential and fails closed on error.
      - Codex callback attempts are loopback-only, cancellable, bounded, and never persist callback URLs or diagnostics.
      - Default mobile artifacts exclude network diagnostic hooks; a separate hook artifact proves only diagnostic plumbing.
    verified_by:
      - test: reasonsShareOneForegroundServiceUntilLastLeaseEnds
      - test: networkCriticalGuardStartsAndStopsDeclaredDataSyncService
      - test: connectivity_preflight_selects_distinct_oauth_turn_and_refresh_targets
      - test: connectivity_preflight_route_requires_cap_strict_json_and_no_store
      - test: network_snapshot_registration_uses_engine_session_and_closed_guard_reason
      - test: agent_status_keeps_selected_codex_provider_when_refresh_is_required
      - test: product_credential_refresh_uses_injected_clock_and_finite_expiry
      - test: partial_refresh_response_never_replaces_last_complete_encrypted_credential
      - test: concurrent_refresh_for_one_provider_is_serialized
      - test: codex_callback_blocking_accept_cannot_outlive_deadline
      - test: codex_refresh_device_hook_is_one_shot_and_does_not_change_the_clock
      - test: networkPreflightHookIsFeatureGatedOwnerOnlyAndOneShot
      - file: docs/evidence/issue-640-manifest.json
