      - test: only_ciphertext_is_stored_no_plaintext
      - test: active_turn_records_observed_head_and_lease_state
      - test: put_turn_if_absent_is_idempotent_for_same_bytes
      - test: put_turn_if_absent_rejects_same_ulid_different_bytes
      - test: graph_turn_put_conflict_same_bytes_is_idempotent
      - test: graph_lease_create_conflict_returns_busy
      - test: graph_lease_takeover_uses_if_match
      - test: graph_lease_release_checks_holder_and_lease_id
      - test: filesystem_cache_persists_offline_pending_restart
      - test: file_session_cache_pending_files_are_owner_only
      - test: sync_pending_removes_files_after_success_and_is_idempotent
      - test: sync_pending_remote_different_bytes_errors_and_keeps_pending
      - test: load_reports_two_heads_as_fork
      - test: forced_offline_concurrent_turns_surface_fork_on_reconnect
      - test: agent_session_kdf_benchmark_json_is_structured_and_redacted
      - test: live_onedrive_session_roundtrip_ciphertext_and_cleanup
  - id: REQ-AGENT-007
    title: Streaming is a typed AgentStreamHub with cancel and backpressure
    statement: >
      Token streaming uses a per-turn-id bounded channel emitting typed events
      (token/tool_call/tool_result/confirmation_required/error/done), with a cancel
      endpoint and backpressure/timeout — not the existing `change`-only SSE ping.
      On mobile every agent route is session-token gated. (S-AG.6, #621)
    status: implemented
    design: docs/adr/007-agent-architecture.md
    acceptance:
      - The hub emits the typed event set for a turn.
      - A turn can be cancelled mid-stream.
      - A slow consumer is bounded (no unbounded buffer).
    verified_by:
      - test: agent_stream_hub_emits_typed_events_and_cancels
      - test: agent_stream_hub_slow_consumer_times_out_without_unbounded_buffer
      - test: agent_stream_event_json_is_single_line_and_stable
      - test: daemon_agent_fake_turn_streams_tokens_to_subscriber
      - test: daemon_agent_pending_turn_stream_closes_with_pending_confirmation_done
      - test: daemon_agent_cancel_ends_stream_with_cancelled_done
      - test: daemon_agent_unopened_stream_is_swept
      - test: agent_chat_alias_matches_turn_route
      - test: mobile_agent_routes_require_session_token_even_with_cap_token
      - test: agent_stream_sse_requires_session_token_on_mobile
      - test: open_bridge_stream_gates_events_and_agent
  - id: REQ-AGENT-008
    title: Provider policy — Claude/Codex app OAuth product path, FakeProvider CI fallback
    statement: >
      The product provider path is app-authorized Claude/Codex OAuth with tokens
      loaded from encrypted host/mobile credential storage. Product builds must not
      ask for BYO Anthropic/OpenAI API keys, must not use `ProviderApiKey` as the
      product setup path, and must not read local `~/.claude` or `~/.codex` CLI auth.
      FakeProvider remains the deterministic CI/unconfigured fallback only. The
      local CLI credential fallback and private wire-drift capture stay separated
      under #627/default-off `agent-subscription-experimental`. (S-AG.2/#617,
      S-AG.8/#623, S-AG.12/#627)
    status: implemented
    design: docs/adr/007-agent-architecture.md
    acceptance:
      - Desktop and mobile product feature wiring includes the app-OAuth provider runtime without requiring #627's local CLI fallback.
      - Claude/Codex product auth loads encrypted CredentialStore OAuth material first and ignores local CLI auth files in non-experimental builds.
      - Non-live provider tests isolate HOME, CODEX_HOME, CLAUDE_CONFIG_DIR, API-key env vars, provider overrides, and unexpected provider network access.
      - Claude/Codex provider streams emit tokens before completion; Codex requests keep `store:false`.
      - The WebUI setup posts product provider IDs (`claude`, `codex`) and exposes no BYO API-key setup row.
      - #627 remains separate for local CLI fallback/capture and cannot be counted as #623 product-auth evidence.
      - Local CLI reads are Linux desktop-only, bounded, default-off, never persisted, and cannot satisfy product onboarding/readiness.
      - Default daemon/mobile/release feature graphs and built artifacts exclude the experimental fallback.
      - The provider-required auth/billing/subscription identity envelope remains unchanged and in place while all default-client harness components are absent and exactly one `isyncyou` tool is installed.
      - Reduced client-drift summaries contain no credentials, account identifiers, user content, raw hashes, local paths, or standalone wire recipe; unavailable visibility is reported honestly.
    verified_by:
      - test: product_oauth_feature_does_not_export_byo_api_providers
      - test: app_host_product_code_does_not_reference_legacy_byo_provider_types
      - test: app_host_product_source_has_no_credential_ingest_surface
      - test: product_oauth_provider_does_not_read_desktop_cli_fallbacks
      - test: product_build_does_not_read_dot_claude
      - test: product_build_does_not_read_dot_codex
