# cargo-deny configuration.
# License gate enforces our rule: permissive deps only — NO GPL code may be linked.
# (Techniques from GPL tools like abraunegg/onedrive are re-implemented, never copied.)

[advisories]
version = 2
yanked = "deny"
ignore = [
    # fuser (crates/fuse — the on-demand placeholder filesystem) carries an upstream
    # "unsound" advisory for an uninitialized-memory API. Accepted with eyes open:
    # the FUSE feature is Linux-only and platform-gated (not on the default path),
    # and the advisory is an unsoundness note, not a known exploit. Tracked for an
    # upstream `fuser` bump that resolves it.
    "RUSTSEC-2021-0154",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
    # public-domain dedication (the `ksni` SNI tray crate) — maximally permissive
    "Unlicense",
    # Mozilla CA root certificate bundle data (webpki-roots) — permissive, not GPL.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
