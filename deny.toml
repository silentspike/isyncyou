# cargo-deny configuration.
# License gate enforces our rule: permissive deps only — NO GPL code may be linked.
# (Techniques from GPL tools like abraunegg/onedrive are re-implemented, never copied.)

[advisories]
version = 2
yanked = "deny"
# Documented, assessed risk-acceptances — NOT blind ignores. Each is re-checked weekly
# by .github/workflows/advisory-review-reminder.yml, which alerts once its REVIEW-BY
# date passes. cargo-deny 0.19 has no native ignore-expiry, so the date lives here.
ignore = [
    # quick-xml quadratic-time / unbounded-namespace-allocation DoS. Reached ONLY via
    # `wayland-scanner` — a BUILD-TIME proc-macro that parses the trusted, crate-shipped
    # Wayland protocol XML (never attacker-controlled, runs at compile time, not in the
    # product). Pinned to ^0.39 by winit 0.30's Wayland stack; the fix (quick-xml 0.41)
    # requires winit 0.31, which is still a beta. Not exploitable in our usage.
    # REVIEW-BY: 2026-07-10 (revisit when winit 0.31 is stable)
    { id = "RUSTSEC-2026-0194", reason = "build-time wayland-scanner, trusted protocol XML; fix needs winit 0.31 (beta) — REVIEW-BY 2026-07-10" },
    { id = "RUSTSEC-2026-0195", reason = "build-time wayland-scanner, trusted protocol XML; fix needs winit 0.31 (beta) — REVIEW-BY 2026-07-10" },
    # ttf-parser is UNMAINTAINED (a supply-chain hygiene advisory, not a vulnerability).
    # Transitive in the desktop font/GUI stack; no patched version exists. Revisit when
    # the upstream font libraries migrate off it.
    # REVIEW-BY: 2026-07-10
    { id = "RUSTSEC-2026-0192", reason = "unmaintained (not a vuln), transitive font dep, no fix exists — REVIEW-BY 2026-07-10" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    # public-domain dedication (the `ksni` SNI tray crate) — maximally permissive
    "Unlicense",
    # Mozilla CA root certificate bundle data (webpki-roots) — permissive, not GPL.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
skip = [
    { crate = "bitflags@1.3.2", reason = "transitive split from tiny-skia/png and winit platform deps" },
    { crate = "getrandom@0.2.17", reason = "transitive split from ring/secret-service while ecosystem migrates" },
    { crate = "getrandom@0.3.4", reason = "transitive split from rusqlite/winit/proptest while ecosystem migrates" },
    { crate = "jni-sys@0.3.1", reason = "transitive Android platform split from winit/softbuffer stack" },
    { crate = "linux-raw-sys@0.4.15", reason = "transitive split from older rustix used by winit platform stack" },
    { crate = "linux-raw-sys@0.9.4", reason = "transitive split from drm-sys versus rustix 1.x" },
    { crate = "objc2@0.5.2", reason = "transitive macOS/iOS platform split from winit versus softbuffer" },
    { crate = "objc2-foundation@0.2.2", reason = "transitive macOS/iOS platform split from winit versus softbuffer" },
    { crate = "r-efi@5.3.0", reason = "transitive WASI split from getrandom 0.3 versus tempfile/getrandom 0.4" },
    { crate = "redox_syscall@0.4.1", reason = "transitive Redox platform split from winit versus tokio/softbuffer" },
    { crate = "redox_syscall@0.5.18", reason = "transitive Redox platform split from parking_lot_core/softbuffer versus winit/orbclient" },
    { crate = "rustix@0.38.44", reason = "transitive split from winit platform stack versus async/zbus stack" },
    { crate = "thiserror@1.0.69", reason = "transitive split from calloop/smithay while app crates use thiserror 2" },
    { crate = "thiserror-impl@1.0.69", reason = "proc-macro pair for transitive thiserror 1" },
    { crate = "windows-sys@0.52.0", reason = "transitive Windows platform split from ring/rustls versus notify" },
    { crate = "windows-sys@0.60.2", reason = "transitive Windows platform split from notify versus newer Windows crates" },
    { crate = "windows-targets@0.52.6", reason = "transitive Windows platform split from ring/rustls versus notify" },
    { crate = "windows_aarch64_gnullvm@0.52.6", reason = "transitive Windows target split from ring/rustls versus notify" },
    { crate = "windows_aarch64_msvc@0.52.6", reason = "transitive Windows target split from ring/rustls versus notify" },
    { crate = "windows_i686_gnu@0.52.6", reason = "transitive Windows target split from ring/rustls versus notify" },
    { crate = "windows_i686_gnullvm@0.52.6", reason = "transitive Windows target split from ring/rustls versus notify" },
    { crate = "windows_i686_msvc@0.52.6", reason = "transitive Windows target split from ring/rustls versus notify" },
    { crate = "windows_x86_64_gnu@0.52.6", reason = "transitive Windows target split from ring/rustls versus notify" },
    { crate = "windows_x86_64_gnullvm@0.52.6", reason = "transitive Windows target split from ring/rustls versus notify" },
    { crate = "windows_x86_64_msvc@0.52.6", reason = "transitive Windows target split from ring/rustls versus notify" },
    { crate = "wit-bindgen@0.51.0", reason = "transitive split from tempfile WASI dependencies" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
