name: Evidence manifest

# Optional, on-demand: produce a HEAD-pinned evidence manifest with freshly captured
# command output (tools/generate_evidence_manifest.py), validate it with
# check_evidence.py --require-head, and upload it as a build artifact. The committed
# docs/evidence/sample-manifest.json remains the curated source of truth; this job is
# how you get a manifest bound to the exact tree it ran on. Live `probe` entries are
# carried over (they need credentials) unless a credentialed runner sets --run-live.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evidence-manifest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: generate + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - name: Install checker deps
        run: pip install --quiet pyyaml jsonschema
      - name: Generate HEAD-pinned evidence manifest
        run: python3 tools/generate_evidence_manifest.py
      - name: Validate generated manifest (must match HEAD)
        run: python3 tools/check_evidence.py --manifest docs/evidence/generated-manifest.json --require-head
      - name: Upload evidence manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: evidence-manifest
          path: docs/evidence/generated-manifest.json
          if-no-files-found: error
