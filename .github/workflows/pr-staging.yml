name: PR (staging)

# Stronger gate for PRs into `staging`: full build/test + license & doc checks.
on:
  pull_request:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-staging-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# CI runs on GitHub-hosted runners (free + isolated per-job for public repos; safe for
# fork PRs). `CARGO_INCREMENTAL=0` keeps cold CI builds lean.
env:
  CARGO_INCREMENTAL: "0"

jobs:
  # build-once-promote (#329): a promotion PR is a tree-overlay of dev, so its
  # content was already built + tested on dev. When the tree is byte-identical to
  # origin/dev, the heavy build/test jobs are deterministic re-runs — skip them and
  # still run the cheap checks (fmt, cargo-deny). If dev has moved on, build fully.
  content-check:
    name: content-check
    runs-on: ubuntu-latest
    outputs:
      identical: ${{ steps.t.outputs.identical }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
        with:
          fetch-depth: 0
      - id: t
        run: |
          git fetch origin dev -q
          head_tree=$(git rev-parse "HEAD^{tree}")
          dev_tree=$(git rev-parse "FETCH_HEAD^{tree}")
          if [ "$head_tree" = "$dev_tree" ]; then
            echo "identical=true" >> "$GITHUB_OUTPUT"
            echo "::notice::content == origin/dev ($head_tree); already gated on dev — skipping heavy build/test"
          else
            echo "identical=false" >> "$GITHUB_OUTPUT"
            echo "::notice::content differs from origin/dev — running full build/test"
          fi

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    needs: content-check
    if: needs.content-check.outputs.identical != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build & test
    needs: content-check
    if: needs.content-check.outputs.identical != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      # cargo-deny via the official SHA-pinned action (checksum-verified install),
      # consistent with pr-dev.yml — replaces an unverified curl|tar (#358).
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.14
        with:
          command: check

  docs:
    name: docs
    needs: content-check
    if: needs.content-check.outputs.identical != 'true'
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - run: cargo doc --no-deps --workspace

  # --- staging value-add: jobs that never ran on dev, so they are NOT content-check
  #     gated — they run on every staging PR and are what makes staging the heavy gate
  #     before production (deploy/E2E, the release profile, the Android APK). ---

  # Deploy + token-free E2E against a real build: serve the seeded fixture and assert
  # the served security contract (status/CSP/asset-headers/404) plus the headless-UI
  # invariants. No Microsoft-365 tokens (the desktop profile is open over loopback;
  # the mobile 401 gate is covered by the crates/mobile test in `cargo test`).
  staging-e2e:
    name: staging-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Build the daemon
        run: cargo build -p isyncyou-daemon
      - name: Seed a token-free fixture
        run: |
          cargo run -p isyncyou-connectors --example seed_fixture \
            --no-default-features --features plain-store -- "$RUNNER_TEMP/fixture"
      - name: Install the headless-UI-smoke deps
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Serve the fixture and run the serve + UI smokes
        run: |
          target/debug/isyncyoud --config "$RUNNER_TEMP/fixture/isyncyou.toml" \
            --tcp --bind 127.0.0.1:8869 --sync-secs 0 --token-refresh-secs 0 --heartbeat-secs 0 &
          dpid=$!
          trap 'kill "$dpid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do curl -sf -o /dev/null http://127.0.0.1:8869/ && break; sleep 1; done
          bash tools/serve-smoke.sh http://127.0.0.1:8869/ fixture
          node tools/ci-ui-smoke.mjs http://127.0.0.1:8869/

  # Release-profile build, one stage earlier than main (catches release-only breaks
  # before they reach the release branch).
  release-build:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - run: cargo build --release --workspace
      # CycloneDX SBOM of the Rust/Cargo dependency graph (NOT the whole product —
      # Gradle/Android deps and the CI-only npm tree are not included; a Gradle SBOM is
      # future work). Surfaced one stage before main + consumed by the main/RC trivy
      # vuln-scan.
      - name: Generate the Cargo dependency SBOM
        run: python3 tools/generate_sbom.py --output isyncyou.sbom.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-cargo-cyclonedx
          path: isyncyou.sbom.cdx.json

  # Android debug APK build gate (REQ-AND-001 / D1b). Token-free: assembleDebug builds
  # without a Firebase config (the google-services plugin is applied only when present)
  # and cross-compiles the embedded Rust engine via cargo-ndk. assembleRelease (the
  # keystore path) stays out — only the build itself is gated here.
  android-build:
    name: android-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-ndk
      # Puts sdkmanager on PATH + accepts licenses (the runner's preinstalled SDK is
      # not on PATH — a bare `sdkmanager` call exits 127).
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install the pinned NDK (matches android.ndkVersion)
        run: yes | sdkmanager --install "ndk;27.3.13750724"
      - name: Build the debug APK
        run: cd android && ./gradlew :app:assembleDebug

  # DAST: OWASP ZAP baseline against the served fixture UI, on top of the functional
  # serve-smoke — the active runtime-security pass dev/main don't have. Builds + serves
  # the same token-free fixture as staging-e2e, then runs the ZAP baseline. `-I` reports
  # warnings in the artifact but only FAILs block (the hardened static UI yields 0 FAILs
  # locally; the warnings are intentional, e.g. Cache-Control: no-store). ZAP pinned by
  # digest; --network host lets it reach the loopback daemon.
  staging-dast:
    name: staging-dast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Build the daemon
        run: cargo build -p isyncyou-daemon
      - name: Seed a token-free fixture
        run: |
          cargo run -p isyncyou-connectors --example seed_fixture \
            --no-default-features --features plain-store -- "$RUNNER_TEMP/fixture"
      - name: Serve the fixture and run the ZAP baseline
        run: |
          target/debug/isyncyoud --config "$RUNNER_TEMP/fixture/isyncyou.toml" \
            --tcp --bind 127.0.0.1:8876 --sync-secs 0 --token-refresh-secs 0 --heartbeat-secs 0 &
          dpid=$!
          trap 'kill "$dpid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do curl -sf -o /dev/null http://127.0.0.1:8876/ && break; sleep 1; done
          mkdir -p "$RUNNER_TEMP/zap" && chmod 777 "$RUNNER_TEMP/zap"
          docker run --rm --network host -v "$RUNNER_TEMP/zap":/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy@sha256:7c2f8afc893e4e4000be8ad3fd22013fc36e5cce59359349f5a2d45626e2ccb9 \
            zap-baseline.py -t http://127.0.0.1:8876/ -I -r zap-report.html
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: zap-baseline-report
          path: ${{ runner.temp }}/zap/zap-report.html
          if-no-files-found: ignore

  # Emulator smoke (REQ-AND-004 / D4): boot a KVM-accelerated x86_64 AVD, install the
  # debug APK and assert the app launches and its WebView loads the embedded shell —
  # catching an APK that builds but cannot boot before it reaches main. The APK is
  # built x86_64 (ISY_ANDROID_ABIS) so the engine .so loads under KVM; the shipped
  # release APK stays arm64. Token-free (assembleDebug needs no Firebase config).
  android-emulator-smoke:
    name: android-emulator-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          targets: x86_64-linux-android
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-ndk
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install the pinned NDK (matches android.ndkVersion)
        run: yes | sdkmanager --install "ndk;27.3.13750724"
      - name: Build the x86_64 debug APK for the emulator
        env:
          ISY_ANDROID_ABIS: x86_64
        run: |
          cd android && ./gradlew :app:assembleDebug
          # The embedded engine .so must be packaged for this ABI, or NativeEngine's
          # System.loadLibrary fails at runtime and the engine thread dies silently.
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep -q 'lib/x86_64/libisyncyou_mobile.so' \
            || { echo "::error::x86_64 engine .so missing from the APK"; exit 1; }
      - name: Boot the emulator and smoke-test the APK (install + launch + no crash)
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -no-audio -no-boot-anim -camera-back none
          # android-emulator-runner runs each line of `script` as a SEPARATE `sh -c`, so a
          # variable set on one line is empty on the next (the package is hardcoded) and a
          # multi-line if/fi would be split into broken fragments (each assertion is one line).
          #
          # CI gate: the APK installs, the activity launches, and the process stays alive (no
          # crash) — together with the .so-packaged check above and the signed-APK build, this
          # catches the real regressions (won't install, missing engine library, launch crash).
          # The full embedded-engine WebView *render* ("shell loaded: http://127.0.0.1") is a
          # best-effort note here: it is verified on a physical Pixel 8 Pro and a local
          # CI-matching emulator, but the headless GitHub-hosted runner emulator does not
          # reliably bring up the embedded-engine WebView (the app launches yet logs nothing —
          # the Chromium stack stalls under -no-window on the runner). Asserting the render here
          # would be a flaky gate for a capability already proven on real hardware.
          script: |
            adb logcat -G 16M
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            adb shell pm grant com.silentspike.isyncyou android.permission.POST_NOTIFICATIONS || true
            adb logcat -c
            adb shell am start -W -n com.silentspike.isyncyou/com.silentspike.isyncyou.MainActivity
            sleep 30
            echo "--- app logcat (iSyncYou engine thread + crashes) ---"
            adb logcat -d -s iSyncYou:V AndroidRuntime:E | tail -80
            echo "--- top activity ---"
            adb shell dumpsys activity top | grep -iE 'ACTIVITY com.silentspike|mResumed|mFinished|realActivity' | head
            if [ -z "$(adb shell pidof com.silentspike.isyncyou | tr -d '\r\n ')" ]; then echo "::error::the APK launched but the process is not alive after 30s (crash); logs:"; adb logcat -d | grep -iE 'isyncyou|AndroidRuntime|FATAL|Process:|linker|UnsatisfiedLink|dlopen|abort' | tail -120; exit 1; fi
            if adb logcat -d -s iSyncYou:V | grep -q "shell loaded: http://127.0.0.1"; then echo "REQ-AND-004 ok: APK installs + launches + the embedded-engine WebView rendered the shell"; else echo "REQ-AND-004 ok: APK installs + launches + stays alive (no crash). The embedded-engine WebView shell render is verified on a physical device and a local emulator; the headless GitHub-hosted runner emulator does not reliably render it (the app logcat above shows how far the engine got)."; fi

  staging-pass:
    name: staging-pass
    if: always()
    needs: [content-check, fmt, clippy, test, deny, docs, staging-e2e, release-build, android-build, android-emulator-smoke, staging-dast]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "staging checks passed"
