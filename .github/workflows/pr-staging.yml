name: PR (staging)

# Stronger gate for PRs into `staging`: full build/test + license & doc checks.
on:
  pull_request:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-staging-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build & test
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  deny:
    name: cargo-deny
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install cargo-deny (prebuilt)
        run: |
          if ! cargo deny --version >/dev/null 2>&1; then
            ver=0.19.8
            tmp=$(mktemp -d)
            curl -sSfL "https://github.com/EmbarkStudios/cargo-deny/releases/download/${ver}/cargo-deny-${ver}-x86_64-unknown-linux-musl.tar.gz" | tar -xz -C "$tmp"
            mkdir -p "${CARGO_HOME:-$HOME/.cargo}/bin"
            install -m0755 "$tmp"/*/cargo-deny "${CARGO_HOME:-$HOME/.cargo}/bin/cargo-deny"
          fi
      - run: cargo deny check

  docs:
    name: docs
    runs-on: [self-hosted, Linux, X64]
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - run: cargo doc --no-deps --workspace

  # TODO(staging): integration tests (mock-first Graph fixtures) and headless
  # UI snapshot tests are added here once those suites exist.

  staging-pass:
    name: staging-pass
    if: always()
    needs: [fmt, clippy, test, deny, docs]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "staging checks passed"
