name: PR (staging)

# Stronger gate for PRs into `staging`: full build/test + license & doc checks.
on:
  pull_request:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-staging-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: build & test
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace

  deny:
    name: cargo-deny
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny (cached in runner home)
        run: command -v cargo-deny >/dev/null || cargo install cargo-deny --locked
      - run: cargo deny check

  docs:
    name: docs
    runs-on: [self-hosted, Linux, X64]
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --no-deps --workspace

  # TODO(staging): integration tests (mock-first Graph fixtures) and headless
  # UI snapshot tests are added here once those suites exist.

  staging-pass:
    name: staging-pass
    if: always()
    needs: [fmt, clippy, test, deny, docs]
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "staging checks passed"
