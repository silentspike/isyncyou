name: Scorecard

# OpenSSF Scorecard: continuous supply-chain security posture scoring (branch
# protection, pinned actions, token permissions, dangerous workflows, etc.).
# Results land in the repo's code-scanning view and are published for the badge.
on:
  branch_protection_rule:
  schedule:
    - cron: "30 7 * * 1"
  push:
    branches: [dev] # repo default branch; scorecard-action only supports the default
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.30.5
        with:
          sarif_file: results.sarif
