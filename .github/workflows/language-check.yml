name: Language check

# English-only gate: every PR into dev/staging/main is scanned for German text.
# A failure prints file:line + the offending token + how to resolve it, so an
# agent gets actionable feedback, fixes the change, and re-submits the PR.
on:
  pull_request:
    branches: [dev, staging, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: language-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  english-only:
    name: language-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
      - name: German-language gate
        run: python3 tools/check_language.py
