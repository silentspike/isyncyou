name: actionlint

# Lint the workflow files themselves (syntax, expression errors, shellcheck of
# `run:` blocks, deprecated/incorrect action usage).
on:
  pull_request:
    paths: ['.github/workflows/**']
  push:
    branches: [dev, main]
    paths: ['.github/workflows/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
        with:
          fail-on-error: true
