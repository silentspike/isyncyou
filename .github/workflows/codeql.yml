name: CodeQL

# Static analysis (SAST) across the three languages this repo ships: Rust (the
# engine/daemon), JavaScript (the hand-written web UI embedded into the daemon) and
# Kotlin (the Android app). Runs on `staging` and `main` PRs so the heavy SAST lands
# on staging — the gate before production — not only once a change reaches `main`.
# CodeQL is free for public repos (it needs GitHub Advanced Security on a private
# repo); the three `Analyze (<language>)` checks are wired as required status checks
# on staging + main via branch protection.
on:
  push:
    branches: [main]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Rust: CodeQL's Rust extractor only supports buildless extraction
          # (build-mode none) — autobuild is rejected as a fatal error.
          - language: rust
            build-mode: none
          # JavaScript/TypeScript: the embedded web UI is plain source — no build.
          - language: javascript-typescript
            build-mode: none
          # Kotlin: built manually (same steps as the staging android-build, incl. the
          # cargo-ndk cross-compile) so CodeQL traces real bytecode. build-mode: none is
          # not valid for Kotlin.
          - language: java-kotlin
            build-mode: manual
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0

      # --- Kotlin/Android manual-build prerequisites (mirrors pr-staging android-build) ---
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: "17"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: matrix.language == 'java-kotlin'
        with:
          toolchain: "1.95.0"
          targets: aarch64-linux-android
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        if: matrix.language == 'java-kotlin'
        with:
          tool: cargo-ndk
      # sdkmanager onto PATH + licenses (preinstalled SDK isn't on PATH → bare call 127).
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        if: matrix.language == 'java-kotlin'
      - name: Install the pinned NDK (matches android.ndkVersion)
        if: matrix.language == 'java-kotlin'
        run: yes | sdkmanager --install "ndk;27.3.13750724"

      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3.30.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Manual build (Kotlin)
        if: matrix.language == 'java-kotlin'
        run: cd android && ./gradlew :app:assembleDebug

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3.30.5
        with:
          category: "/language:${{ matrix.language }}"
