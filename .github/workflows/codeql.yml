name: CodeQL

# Static analysis for Rust. CodeQL on a *private* repo needs GitHub Advanced
# Security; it is free for public repos. To avoid failing the dev PR gate while the
# repo is still private, this runs only against `main` and on demand — it activates
# automatically once the repo is public and the release branch is exercised.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    # Enforced gate (#348): the Rust analyze step runs clean on `main` PRs (verified —
    # every step succeeds on its own, not masked), so a real finding now fails the
    # build. `Analyze (rust)` is a required status check on `main` via branch
    # protection. (CodeQL is free on public repos; it needed GitHub Advanced Security
    # while the repo was private.)
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.30.5
        with:
          languages: rust
      - uses: github/codeql-action/autobuild@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.30.5
      - uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.30.5
        with:
          category: "/language:rust"
