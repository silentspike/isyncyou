name: Auto Label

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isIssue = !!context.payload.issue;
            const obj = context.payload.issue || context.payload.pull_request;
            const title = obj.title.toLowerCase();
            const labels = new Set();

            if (isIssue) {
              labels.add('status:backlog');
              if (/\[epic\]|^e-/.test(title)) { labels.add('type:epic'); labels.add('priority:high'); }
              else if (/\[story\]|^s-/.test(title)) { labels.add('type:story'); }
              else if (/\[task\]|^t-/.test(title)) { labels.add('type:task'); }
            }

            const stripped = title.replace(/^\[[^\]]+\]\s*/, '');
            if (/^(feat)(\(|:)/.test(stripped)) labels.add('type:feature');
            else if (/^(fix)(\(|:)/.test(stripped)) labels.add('type:bug');
            else if (/^(docs)(\(|:)/.test(stripped)) labels.add('type:docs');
            else if (/^(refactor)(\(|:)/.test(stripped)) labels.add('type:refactor');
            else if (/^(ci)(\(|:)/.test(stripped)) labels.add('type:ci');
            else if (/^(spike)(\(|:)/.test(stripped)) labels.add('type:spike');
            else if (/^(deps)(\(|:)|chore\(deps\)/.test(stripped)) labels.add('type:deps');

            if (!isIssue && obj.user && obj.user.login === 'dependabot[bot]') labels.add('type:deps');

            const arr = [...labels];
            if (arr.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: obj.number, labels: arr,
              });
            }
