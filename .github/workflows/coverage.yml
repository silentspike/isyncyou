name: Coverage

# Code-coverage gate: measures workspace line coverage with cargo-llvm-cov and
# fails under a floor, so the test substance is visible and cannot silently rot.
# Runs on PRs into dev (and on dev/main push for the badge); deliberately NOT part
# of the dev->staging->main promotion gates, to keep the autonomous cascade fast.
on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-llvm-cov
      - name: Measure coverage (fail under 75% lines)
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov --workspace --summary-only --fail-under-lines 75 \
            | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
