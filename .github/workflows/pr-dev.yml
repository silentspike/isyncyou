name: PR (dev)

# Fast gate for PRs into `dev`: developers must be able to merge quickly.
# Runs on GitHub-hosted runners (public-ready: no self-hosted exposure to fork PRs).
# A `changes` filter gates the compile-heavy steps: docs/markdown-only PRs skip the
# build, but the required checks (`dev-checks`, `cargo-deny`) still run and report
# success (each job always runs; only the heavy steps are conditional), so branch
# protection is never left waiting.
on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter reads the PR's changed-file list via the API

concurrency:
  group: pr-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'rust-toolchain.toml'
              - '.github/workflows/**'

  dev-checks:
    name: dev-checks
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: No code/CI changes — skip compile gate
        if: needs.changes.outputs.code != 'true'
        run: echo "No Rust/Cargo/CI changes in this PR — compile gate skipped."
      - name: Install Linux GUI build deps
        if: needs.changes.outputs.code == 'true'
        # winit / softbuffer (gui/statusbar-app) link against these on Linux.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: needs.changes.outputs.code == 'true'
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        if: needs.changes.outputs.code == 'true'
      - name: Format
        if: needs.changes.outputs.code == 'true'
        run: cargo fmt --all --check
      - name: Clippy
        if: needs.changes.outputs.code == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Unit tests
        if: needs.changes.outputs.code == 'true'
        run: cargo test --workspace

  # MSRV drift guard (#408): build with the *declared* rust-version so a dependency
  # bump that silently raises the real minimum compiler fails the PR instead of
  # landing unnoticed (rusqlite 0.40 → libsqlite3-sys/cfg_select did exactly that).
  # Keep `toolchain:` in sync with `rust-version` in Cargo.toml.
  msrv:
    name: msrv
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: No code/CI changes — skip MSRV gate
        if: needs.changes.outputs.code != 'true'
        run: echo "No Rust/Cargo/CI changes in this PR — MSRV gate skipped."
      - name: Install Linux GUI build deps
        if: needs.changes.outputs.code == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: needs.changes.outputs.code == 'true'
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        if: needs.changes.outputs.code == 'true'
      - name: Check workspace on the declared MSRV
        if: needs.changes.outputs.code == 'true'
        run: |
          declared=$(grep -m1 '^rust-version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          [ "$declared" = "1.95" ] || { echo "::error::msrv job toolchain (1.95) != declared rust-version ($declared) — update both together"; exit 1; }
          cargo +1.95 check --workspace

  deny:
    name: cargo-deny
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: No dependency/deny changes — skip cargo-deny
        if: needs.changes.outputs.code != 'true'
        run: echo "No Cargo/deny.toml changes in this PR — cargo-deny skipped."
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.14
        if: needs.changes.outputs.code == 'true'
        with:
          command: check

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
