name: PR (dev)

# Fast gate for PRs into `dev`: developers must be able to merge quickly.
on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dev-checks:
    name: dev-checks
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Unit tests
        run: cargo test --workspace
