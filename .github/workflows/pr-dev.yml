name: PR (dev)

# Fast gate for PRs into `dev`: developers must be able to merge quickly.
# Runs on GitHub-hosted runners (public-ready: no self-hosted exposure to fork PRs).
# A `changes` filter gates the compile-heavy steps: docs/markdown-only PRs skip the
# build, but the required checks (`dev-checks`, `cargo-deny`) still run and report
# success (each job always runs; only the heavy steps are conditional), so branch
# protection is never left waiting.
on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter reads the PR's changed-file list via the API

concurrency:
  group: pr-dev-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      js: ${{ steps.filter.outputs.js }}
      sast: ${{ steps.filter.outputs.sast }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - 'rust-toolchain.toml'
              - '.github/workflows/**'
              # the web UI (app.js/app.css/index.html) is embedded into the daemon
              # via include_str!, so a change there must run the Rust build + tests.
              - 'gui/webui/**'
            js:
              - 'gui/webui/**/*.js'
            # SAST surface: the hand-written web UI (JS), the Android app (Kotlin) and
            # the workflows. Drives the `semgrep` job so a Kotlin-only PR still runs
            # SAST — the `code` filter above intentionally omits android/**.
            sast:
              - 'gui/webui/**'
              - 'android/**'
              - '.github/workflows/**'

  dev-checks:
    name: dev-checks
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: No code/CI changes — skip compile gate
        if: needs.changes.outputs.code != 'true'
        run: echo "No Rust/Cargo/CI changes in this PR — compile gate skipped."
      - name: Install Linux GUI build deps
        if: needs.changes.outputs.code == 'true'
        # winit / softbuffer (gui/statusbar-app) link against these on Linux.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: needs.changes.outputs.code == 'true'
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        if: needs.changes.outputs.code == 'true'
      - name: Format
        if: needs.changes.outputs.code == 'true'
        run: cargo fmt --all --check
      - name: Clippy
        if: needs.changes.outputs.code == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Unit tests
        if: needs.changes.outputs.code == 'true'
        run: cargo test --workspace

  # The web UI is hand-written vanilla JS embedded into the daemon via include_str!.
  # A syntax error still *compiles* (it is just a string to Rust) and only blows up
  # at runtime in the browser, so parse-check it here on every JS change.
  js-check:
    name: js-check
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: No web-UI JS changes — skip
        if: needs.changes.outputs.js != 'true'
        run: echo "No gui/webui JS changes in this PR — node --check skipped."
      - name: Syntax-check the embedded web UI
        if: needs.changes.outputs.js == 'true'
        run: node --check gui/webui/src/app.js

  # MSRV drift guard (#408): build with the *declared* rust-version so a dependency
  # bump that silently raises the real minimum compiler fails the PR instead of
  # landing unnoticed (rusqlite 0.40 → libsqlite3-sys/cfg_select did exactly that).
  # Keep `toolchain:` in sync with `rust-version` in Cargo.toml.
  msrv:
    name: msrv
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: No code/CI changes — skip MSRV gate
        if: needs.changes.outputs.code != 'true'
        run: echo "No Rust/Cargo/CI changes in this PR — MSRV gate skipped."
      - name: Install Linux GUI build deps
        if: needs.changes.outputs.code == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: needs.changes.outputs.code == 'true'
        with:
          toolchain: "1.95"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        if: needs.changes.outputs.code == 'true'
      - name: Check workspace on the declared MSRV
        if: needs.changes.outputs.code == 'true'
        run: |
          declared=$(grep -m1 '^rust-version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          [ "$declared" = "1.95" ] || { echo "::error::msrv job toolchain (1.95) != declared rust-version ($declared) — update both together"; exit 1; }
          cargo +1.95 check --workspace

  deny:
    name: cargo-deny
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: No dependency/deny changes — skip cargo-deny
        if: needs.changes.outputs.code != 'true'
        run: echo "No Cargo/deny.toml changes in this PR — cargo-deny skipped."
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.14
        if: needs.changes.outputs.code == 'true'
        with:
          command: check

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  # Fast OSS SAST (shift-left): pattern analysis for the hand-written web UI (JS) and
  # the Android app (Kotlin), plus a secrets sweep. Rust is covered by clippy +
  # cargo-deny here and CodeQL on staging/main (semgrep's Rust support is only
  # experimental). Token-free — the OSS registry rulesets need no Semgrep Cloud login,
  # and --metrics=off disables telemetry. The image is pinned by digest.
  semgrep:
    name: semgrep
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: No SAST-relevant changes — skip semgrep
        if: needs.changes.outputs.sast != 'true'
        run: echo "No gui/webui, android or workflow changes in this PR — semgrep skipped."
      - name: Semgrep (JS / Kotlin / secrets)
        if: needs.changes.outputs.sast == 'true'
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            semgrep/semgrep@sha256:a265d09a9ca712e6624aca09056304ce4314a695b7028d65c041dd53fd44c700 \
            semgrep scan --config p/javascript --config p/kotlin --config p/secrets --config p/security-audit \
            --error --metrics=off gui/webui android
