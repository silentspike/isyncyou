name: Verify docs

# Enforce the requirement -> test -> evidence chain on every PR:
#   check_traceability.py : every implemented requirement maps to an existing test
#   check_evidence.py     : the evidence manifest is schema-valid and cites real requirements
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-docs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  requirements-and-evidence:
    name: requirements + evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
        with:
          # Full history so check_evidence.py can verify the manifest's pinned
          # commit exists (the default shallow fetch-depth=1 omits ancestors).
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.x"
      - name: Install checker deps
        # Version-pinned for reproducible CI (these are dev-only doc-validation helpers).
        run: pip install --quiet pyyaml==6.0.3 jsonschema==4.26.0
      - name: Requirements traceability
        run: python3 tools/check_traceability.py
      - name: Evidence manifest
        run: python3 tools/check_evidence.py
