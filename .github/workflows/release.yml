name: Release

# Fast RCs: every merge to main builds binaries and publishes an RC prerelease.
# A semver tag (vX.Y.Z) publishes a full release.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# Least-privilege default for the whole workflow; the build job below elevates to
# exactly what it needs (publish the release, sign keylessly, attest).
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build & publish
    # GitHub-hosted only. No self-hosted runner is used anywhere once the repo is public:
    # a self-hosted runner lives on our own infra (cluster network), so any code execution
    # on it is an attack surface — unacceptable for a public repo. release.yml installs its
    # own host deps below, so it is fully self-contained on ubuntu-latest.
    runs-on: ubuntu-latest
    # The signed Android APK is built once (android-apk job) and reused here, so the
    # bytes published are exactly the bytes apksigner-verified there (REQ-AND-005).
    needs: [android-apk]
    permissions:
      contents: write # publish the RC/release + upload assets
      id-token: write # cosign keyless (OIDC) + provenance
      attestations: write # SBOM / build provenance attestations
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - name: Install Linux GUI build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq pkg-config libxkbcommon-dev libwayland-dev libx11-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Collect artifacts
        run: |
          mkdir -p dist/isyncyou
          for b in isyncyoud isyncyou isyncyou-doctor isyncyou-statusbar; do
            [ -f "target/release/$b" ] && install -m755 "target/release/$b" "dist/isyncyou/$b"
          done
          cp packaging/isyncyou.toml.sample packaging/README.md packaging/isyncyoud.service dist/isyncyou/
          (cd dist/isyncyou && for b in isyncyou isyncyoud isyncyou-doctor; do [ -f "$b" ] && sha256sum "$b"; done > SHA256SUMS)
          # one distributable archive: binaries + sample config + README
          tar -C dist -czf dist/isyncyou-linux-x86_64.tar.gz isyncyou
          (cd dist && sha256sum isyncyou-linux-x86_64.tar.gz > isyncyou-linux-x86_64.tar.gz.sha256)
          ls -la dist dist/isyncyou

      - name: Smoke-test the Linux binary (#362)
        run: |
          # The shipped tarball binary must run and report its version (the AppImage
          # is smoke-tested separately below).
          tar -xzf dist/isyncyou-linux-x86_64.tar.gz -C "$RUNNER_TEMP"
          "$RUNNER_TEMP/isyncyou/isyncyou" --version
          "$RUNNER_TEMP/isyncyou/isyncyou" --help >/dev/null

      - name: Build AppImage
        run: |
          # squashfs-tools (mksquashfs) + appimagetool are the only host deps; the
          # runner has passwordless sudo. appimagetool is cached in $HOME across runs.
          sudo apt-get update -qq
          sudo apt-get install -y -qq squashfs-tools
          tool="$HOME/appimagetool"
          if [ ! -x "$tool" ]; then
            curl -fsSL -o "$tool" \
              "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
            chmod +x "$tool"
          fi
          # FUSE may be unavailable in the container → extract-and-run instead.
          APPIMAGETOOL="$tool" APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 \
            bash packaging/build-appimage.sh target/release dist
          (cd dist && sha256sum isyncyou-x86_64.AppImage > isyncyou-x86_64.AppImage.sha256)
          # smoke-test the produced AppImage runs and reports its version
          APPIMAGE_EXTRACT_AND_RUN=1 dist/isyncyou-x86_64.AppImage --version
          ls -la dist

      - name: Build Windows binaries (cross via mingw-w64)
        run: |
          # The CLI/daemon are cross-platform; the FUSE mount + unix-socket are
          # cfg(unix)-gated out. Cross-compile with the mingw GNU toolchain.
          sudo apt-get install -y -qq mingw-w64 zip
          rustup target add x86_64-pc-windows-gnu
          export CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc
          cargo build --release --target x86_64-pc-windows-gnu \
            -p isyncyou-cli -p isyncyou-daemon
          mkdir -p dist/isyncyou-windows
          cp target/x86_64-pc-windows-gnu/release/isyncyou.exe \
             target/x86_64-pc-windows-gnu/release/isyncyoud.exe \
             packaging/isyncyou.toml.sample packaging/README.md dist/isyncyou-windows/
          (cd dist && zip -rq isyncyou-windows-x86_64.zip isyncyou-windows \
             && sha256sum isyncyou-windows-x86_64.zip > isyncyou-windows-x86_64.zip.sha256)
          ls -la dist

      # Bring the signed APK that android-apk built this run into dist/ (REQ-AND-005:
      # build-once). On a stable tag we instead reuse the byte-identical APK from the
      # RC prerelease that was built from this exact commit, so users get exactly the
      # bytes that were tested (promote-many).
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: isyncyou-android-apk
          path: dist
      - name: Reuse the matching RC's APK on a stable tag (REQ-AND-005)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The stable tag must point at the exact commit an RC was built from. Find
          # that RC prerelease and download its APK, replacing the one rebuilt this run,
          # then verify the checksum — guaranteeing identical bytes (build-once).
          sha="${{ github.sha }}"
          rc=""
          while read -r tag; do
            tsha=$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag" -q '.object.sha' 2>/dev/null || true)
            if [ "$tsha" = "$sha" ]; then rc="$tag"; break; fi
          done < <(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
                     -q '.[] | select(.prerelease==true) | .tag_name')
          if [ -z "$rc" ]; then
            echo "::error::No RC prerelease was built from $sha — tag the exact commit an RC was built from (build-once / promote-many, REQ-AND-005)."
            exit 1
          fi
          echo "reusing the signed APK from prerelease $rc"
          rm -f dist/isyncyou-android-arm64.apk dist/isyncyou-android-arm64.apk.sha256
          gh release download "$rc" --repo "$GITHUB_REPOSITORY" \
            --pattern 'isyncyou-android-arm64.apk*' --dir dist
          (cd dist && sha256sum -c isyncyou-android-arm64.apk.sha256)

      - name: Generate release SBOM and checksums
        run: |
          python3 tools/generate_sbom.py --output dist/isyncyou.sbom.cdx.json
          (cd dist && sha256sum \
            isyncyou-linux-x86_64.tar.gz \
            isyncyou-x86_64.AppImage \
            isyncyou-windows-x86_64.zip \
            isyncyou-android-arm64.apk \
            isyncyou.sbom.cdx.json > SHA256SUMS)

      # Vuln-scan the released dependency composition: trivy over the just-generated
      # CycloneDX SBOM (vuln only — gitleaks owns secrets; the binary/APK carry no
      # language-specific files per a local trivy run). HIGH/CRITICAL fails the release.
      - name: Trivy vulnerability scan (release SBOM)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: sbom
          scan-ref: dist/isyncyou.sbom.cdx.json
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign artifacts (cosign keyless / Sigstore)
        run: |
          # Keyless signing via ambient GitHub OIDC (id-token: write) — no stored key.
          # Each .cosign.bundle is self-contained (signature + Fulcio cert + Rekor proof),
          # verifiable with `cosign verify-blob --bundle <f>.cosign.bundle ...`.
          #
          # Retried per file: a transient network hiccup against Rekor can land the
          # entry but lose the response, so cosign's internal retry then sees
          # 409 createLogEntryConflict and aborts (bit us on the rc.29 build). A
          # fresh attempt produces a new signature → a new, conflict-free entry.
          for f in \
            isyncyou-linux-x86_64.tar.gz \
            isyncyou-x86_64.AppImage \
            isyncyou-windows-x86_64.zip \
            isyncyou-android-arm64.apk \
            isyncyou.sbom.cdx.json \
            SHA256SUMS; do
            ok=0
            for attempt in 1 2 3; do
              if cosign sign-blob --yes "dist/$f" --bundle "dist/$f.cosign.bundle"; then
                ok=1; break
              fi
              echo "::warning::sign-blob failed for $f (attempt $attempt/3), retrying"
              sleep $((attempt * 5))
            done
            [ "$ok" = 1 ] || { echo "::error::signing $f failed after 3 attempts"; exit 1; }
          done
          ls -la dist/*.cosign.bundle

      - name: Verify our own cosign signatures (self-check, #361)
        run: |
          # Fail the release if a signature we just produced does not verify against
          # the expected workflow identity — catches a signing/identity misconfig
          # before anything is published.
          for f in \
            isyncyou-linux-x86_64.tar.gz \
            isyncyou-x86_64.AppImage \
            isyncyou-windows-x86_64.zip \
            isyncyou-android-arm64.apk \
            isyncyou.sbom.cdx.json \
            SHA256SUMS; do
            cosign verify-blob "dist/$f" \
              --bundle "dist/$f.cosign.bundle" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp '^https://github\.com/silentspike/isyncyou/\.github/workflows/release\.yml@'
          done
          echo "all cosign signatures verified"

      - name: Attest release artifact provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            dist/isyncyou-linux-x86_64.tar.gz
            dist/isyncyou-x86_64.AppImage
            dist/isyncyou-windows-x86_64.zip
            dist/isyncyou-android-arm64.apk
            dist/isyncyou.sbom.cdx.json
            dist/SHA256SUMS

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: |
            dist/isyncyou-linux-x86_64.tar.gz
            dist/isyncyou-x86_64.AppImage
            dist/isyncyou-windows-x86_64.zip
          sbom-path: dist/isyncyou.sbom.cdx.json

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: isyncyou-binaries
          path: |
            dist/isyncyou-linux-x86_64.tar.gz
            dist/isyncyou-linux-x86_64.tar.gz.sha256
            dist/isyncyou-x86_64.AppImage
            dist/isyncyou-x86_64.AppImage.sha256
            dist/isyncyou-windows-x86_64.zip
            dist/isyncyou-windows-x86_64.zip.sha256
            dist/isyncyou-android-arm64.apk
            dist/isyncyou-android-arm64.apk.sha256
            dist/SHA256SUMS
            dist/isyncyou.sbom.cdx.json
            dist/*.cosign.bundle
            dist/isyncyou/

      - name: Publish RC prerelease (on push to main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: v1.0.0-rc.${{ github.run_number }}
          # Pin the RC tag to the exact commit this run built (the push-to-main SHA).
          # Without this, softprops creates the tag on the default branch (dev), so the
          # RC tag points at a dev commit that is only tree-identical to main — and the
          # stable-tag APK-reuse step (which matches a stable tag's commit to an RC tag's
          # commit) could never find it. With this, v1.0.0-rc.<run> == the main commit.
          target_commitish: ${{ github.sha }}
          name: iSyncYou v1.0.0-rc.${{ github.run_number }}
          prerelease: true
          files: |
            dist/isyncyou-linux-x86_64.tar.gz
            dist/isyncyou-linux-x86_64.tar.gz.sha256
            dist/isyncyou-x86_64.AppImage
            dist/isyncyou-x86_64.AppImage.sha256
            dist/isyncyou-windows-x86_64.zip
            dist/isyncyou-windows-x86_64.zip.sha256
            dist/isyncyou-android-arm64.apk
            dist/isyncyou-android-arm64.apk.sha256
            dist/SHA256SUMS
            dist/isyncyou.sbom.cdx.json
            dist/*.cosign.bundle
          body: |
            Automated RC build from `${{ github.sha }}`.
            Artifacts include a CycloneDX SBOM, GitHub artifact attestations, and
            cosign (Sigstore) signatures. Verify any artifact, e.g.:

            ```sh
            cosign verify-blob \
              --bundle isyncyou-linux-x86_64.tar.gz.cosign.bundle \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              --certificate-identity-regexp '^https://github.com/silentspike/isyncyou/.github/workflows/release.yml@' \
              isyncyou-linux-x86_64.tar.gz
            ```

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          # The git tag ref is already authoritative for provenance, but pin the
          # release object's target_commitish to the tag's commit too, so the displayed
          # target is the main commit (not the default branch). github.sha == the
          # tagged commit on a tag push.
          target_commitish: ${{ github.sha }}
          files: |
            dist/isyncyou-linux-x86_64.tar.gz
            dist/isyncyou-linux-x86_64.tar.gz.sha256
            dist/isyncyou-x86_64.AppImage
            dist/isyncyou-x86_64.AppImage.sha256
            dist/isyncyou-windows-x86_64.zip
            dist/isyncyou-windows-x86_64.zip.sha256
            dist/isyncyou-android-arm64.apk
            dist/isyncyou-android-arm64.apk.sha256
            dist/SHA256SUMS
            dist/isyncyou.sbom.cdx.json
            dist/*.cosign.bundle
          generate_release_notes: true

  # Build the SIGNED release APK exactly once (REQ-AND-002/003/005). The build job
  # depends on this and attaches the produced APK to the RC prerelease; a stable tag
  # reuses the byte-identical APK from the matching RC. Token-free except for the
  # release secrets (keystore + passwords + Firebase config), which are repo secrets
  # — never committed (REQ-AND-003). GitHub-hosted ubuntu-latest only.
  android-apk:
    name: android signed APK (build-once)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.95.0"
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cargo-ndk
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Install the pinned NDK + build-tools (NDK matches android.ndkVersion)
        run: |
          yes | sdkmanager --install "ndk;27.3.13750724" "build-tools;34.0.0"
      - name: Materialize release signing material from secrets (REQ-AND-003)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # A missing release secret must fail loudly here AND in gradle
          # (ISY_REQUIRE_RELEASE_SIGNING below) — never ship an unsigned release APK.
          for v in KEYSTORE_B64 STORE_PASSWORD KEY_ALIAS KEY_PASSWORD GOOGLE_SERVICES_JSON; do
            if [ -z "${!v}" ]; then
              echo "::error::release secret $v is empty — set the ANDROID_KEYSTORE_B64 / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD / GOOGLE_SERVICES_JSON repo secrets"
              exit 1
            fi
          done
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/release.jks
          {
            echo "storeFile=$GITHUB_WORKSPACE/android/release.jks"
            echo "keyAlias=$KEY_ALIAS"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/signing.properties
          printf '%s' "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
      - name: Build the signed release APK, versioned from the RC (REQ-AND-002)
        env:
          ISY_REQUIRE_RELEASE_SIGNING: "1"
          ISY_VERSION_CODE: ${{ github.run_number }}
        run: |
          # versionName = the workspace version of this commit; versionCode = the
          # monotonic CI run number. No literal "1"/"0.1" reaches the manifest.
          ver=$(awk '/^\[workspace\.package\]/{f=1} f&&/^version[[:space:]]*=/{gsub(/[" ]/,"",$3); print $3; exit}' Cargo.toml)
          echo "workspace version: $ver  versionCode: $ISY_VERSION_CODE"
          (cd android && ISY_VERSION_NAME="$ver" ./gradlew :app:assembleRelease)
      - name: Verify the APK is signed with the release key (REQ-AND-003)
        run: |
          shopt -s nullglob
          apks=(android/app/build/outputs/apk/release/*.apk)
          apk="${apks[0]}"
          bts=("$ANDROID_HOME"/build-tools/*/)
          bt=$(printf '%s\n' "${bts[@]}" | sort -V | tail -1)
          "${bt}apksigner" verify --print-certs "$apk"
          mkdir -p out
          cp "$apk" out/isyncyou-android-arm64.apk
          (cd out && sha256sum isyncyou-android-arm64.apk > isyncyou-android-arm64.apk.sha256)
      - name: Scrub signing material
        if: always()
        run: rm -f android/release.jks android/signing.properties android/app/google-services.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: isyncyou-android-apk
          path: |
            out/isyncyou-android-arm64.apk
            out/isyncyou-android-arm64.apk.sha256
