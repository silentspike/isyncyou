name: Release

# Fast RCs: every merge to main builds binaries and publishes an RC prerelease.
# A semver tag (vX.Y.Z) publishes a full release.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build & publish
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Collect artifacts
        run: |
          mkdir -p dist
          for b in isyncyoud isyncyou isyncyou-doctor; do
            [ -f "target/release/$b" ] && cp "target/release/$b" "dist/$b"
          done
          (cd dist && sha256sum * > SHA256SUMS)
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: isyncyou-binaries
          path: dist/

      - name: Publish RC prerelease (on push to main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-rc.${{ github.run_number }}
          name: iSyncYou v0.1.0-rc.${{ github.run_number }}
          prerelease: true
          files: dist/*
          body: |
            Automated RC build from `${{ github.sha }}`.

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
