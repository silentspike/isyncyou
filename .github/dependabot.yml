version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Vienna"
    commit-message:
      prefix: "deps"
    labels:
      - "type:deps"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Vienna"
    commit-message:
      prefix: "deps"
    labels:
      - "type:deps"
    ignore:
      # Pinned to the `@stable` tag SHA on purpose. The `@master` revision makes
      # `toolchain:` a required input and broke the pipeline once (#373 → #362);
      # bump deliberately, not automatically.
      - dependency-name: "dtolnay/rust-toolchain"
