<title>iSyncYou</title>

     binary, served same-origin). The page is locked down by a Content-Security-

</head>

<div class="bg-mesh"></div>
<div class="bg-noise"></div>
<div id="app">

    <div class="skel" style="width:100%;max-width:640px;height:140px"></div>
  </div>
</div>
<script src="/app.js" defer></script>
</body>
</html>
