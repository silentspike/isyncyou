<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iSyncYou — Archive</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font: 15px/1.5 system-ui, sans-serif; background: #0c121d; color: #e6edf6; }
  header { padding: 16px 20px; background: #111a28; border-bottom: 1px solid #1d2942; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; margin: 0; }
  header .logo { width: 26px; height: 26px; border-radius: 7px; background: #1d4ed8; }
  main { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 59px); }
  nav { border-right: 1px solid #1d2942; padding: 14px; }
  nav h2 { font-size: 12px; text-transform: uppercase; color: #8e9db3; letter-spacing: .05em; }
  nav button { display: block; width: 100%; text-align: left; margin: 2px 0; padding: 7px 10px; border: 0; border-radius: 8px; background: transparent; color: #cdd6e4; cursor: pointer; }
  nav button:hover, nav button.active { background: #18233a; color: #fff; }
  section { padding: 18px 22px; }
  .bar { display: flex; gap: 10px; margin-bottom: 14px; }
  select, input { background: #0f1626; color: #e6edf6; border: 1px solid #25324e; border-radius: 8px; padding: 8px 10px; }
  input { flex: 1; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #18233a; font-size: 14px; }
  th { color: #8e9db3; font-weight: 600; }
  .badge { font-size: 11px; padding: 2px 7px; border-radius: 999px; background: #18233a; color: #8ec6ff; }
  .muted { color: #8e9db3; }
  td a { color: #8ec6ff; text-decoration: none; }
  td a:hover { text-decoration: underline; }
  h3 { font-size: 13px; text-transform: uppercase; color: #8e9db3; letter-spacing: .05em; margin: 22px 0 10px; }
  .cards { display: flex; flex-wrap: wrap; gap: 12px; }
  .card { background: #111a28; border: 1px solid #1d2942; border-radius: 10px; padding: 14px 16px; min-width: 130px; }
  .card .n { font-size: 22px; font-weight: 700; }
  .card .n small { font-size: 13px; font-weight: 400; color: #8e9db3; }
  .card .l { color: #8e9db3; font-size: 13px; text-transform: capitalize; }
  .kv { display: grid; grid-template-columns: 180px 1fr; gap: 4px 14px; max-width: 620px; }
  .kv dt { color: #8e9db3; } .kv dd { margin: 0; }
</style>
</head>
<body>
<header><div class="logo"></div><h1>iSyncYou — Archive</h1><span class="muted" id="acct"></span></header>
<main>
  <nav>
    <button id="ov-btn" class="active" onclick="showOverview()">Overview</button>
    <h2 style="margin-top:18px">Account</h2>
    <select id="account"></select>
    <h2 style="margin-top:18px">Service</h2>
    <div id="services"></div>
  </nav>
  <section>
    <div id="overview" class="muted">Loading…</div>
    <div id="browse" hidden>
      <div class="bar">
        <input id="q" placeholder="Search names / subjects…">
        <button onclick="doSearch()">Search</button>
      </div>
      <table><thead><tr><th>Type</th><th>Name</th><th>Modified</th><th>Body</th><th>Restore</th></tr></thead>
        <tbody id="rows"><tr><td colspan="5" class="muted">Loading…</td></tr></tbody>
      </table>
      <div id="more" hidden style="margin-top:14px">
        <button id="more-btn" onclick="loadMore()">Load more</button>
        <span class="muted" id="count"></span>
      </div>
    </div>
  </section>
</main>
<script>
const SERVICES = ["onedrive", "mail", "calendar", "contacts", "todo", "onenote", "shared"];
// injected by the daemon's `/` handler; empty disables the restore UI (read-only).
const CAP_TOKEN = "__CAP_TOKEN__";
const RESTORABLE = ["mail", "calendar", "contacts", "todo"];
let account = null, service = "mail";

async function api(path) { const r = await fetch(path); return r.json(); }

const PAGE = 50;
let pageOffset = 0, pageTotal = 0;

function rowsHtml(items) {
  return items.map(it => {
    const name = escapeHtml(it.name);
    const q = `account=${encodeURIComponent(account)}&service=${encodeURIComponent(it.service)}&id=${encodeURIComponent(it.remote_id)}`;
    // the name opens the rendered (safe) viewer; a separate link offers raw source
    const cell = it.has_body
      ? `<a href="/api/v1/view?${q}" target="_blank" rel="noopener">${name}</a>`
      : name;
    const bodyCell = it.has_body
      ? `<a href="/api/v1/body?${q}" target="_blank" rel="noopener">raw</a>`
      : "—";
    const restoreCell = (CAP_TOKEN && it.has_body && RESTORABLE.includes(it.service))
      ? `<a href="#" onclick="doRestore('${escapeJs(it.service)}','${escapeJs(it.remote_id)}',this);return false">restore</a>`
      : "—";
    return `<tr>
      <td><span class="badge">${it.item_type}</span></td>
      <td>${cell}</td>
      <td class="muted">${it.remote_mtime || ""}</td>
      <td>${bodyCell}</td>
      <td>${restoreCell}</td></tr>`;
  }).join("");
}
function escapeHtml(s) { return (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escapeJs(s) { return (s || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'"); }

// Re-create an archived item in the cloud via the daemon's restore POST. The
// capability token (injected, same-origin) authorizes the destructive action.
async function doRestore(service, id, el) {
  if (!confirm(`Restore this ${service} item to the cloud as a new copy?`)) return;
  if (el) el.textContent = "…";
  const q = `account=${encodeURIComponent(account)}&service=${encodeURIComponent(service)}&id=${encodeURIComponent(id)}`;
  try {
    const r = await fetch(`/api/v1/restore?${q}`, { method: "POST", headers: { "X-Capability-Token": CAP_TOKEN } });
    const d = await r.json();
    if (r.ok) { if (el) { el.textContent = "✓ restored"; el.removeAttribute("onclick"); } }
    else { if (el) el.textContent = "restore"; alert("Restore failed: " + (d.error || r.status)); }
  } catch (e) { if (el) el.textContent = "restore"; alert("Restore failed: " + e); }
}

const EMPTY_ROW = '<tr><td colspan="5" class="muted">No items.</td></tr>';

function updateMore(shown) {
  document.getElementById("count").textContent = `${shown} of ${pageTotal}`;
  document.getElementById("more").hidden = pageTotal === 0;
  document.getElementById("more-btn").hidden = shown >= pageTotal;
}

async function loadItems() {
  pageOffset = 0;
  const d = await api(`/api/v1/items?account=${encodeURIComponent(account)}&service=${service}&limit=${PAGE}&offset=0`);
  const items = d.items || [];
  pageTotal = d.total ?? items.length;
  document.getElementById("rows").innerHTML = items.length ? rowsHtml(items) : EMPTY_ROW;
  pageOffset = items.length;
  updateMore(pageOffset);
}
async function loadMore() {
  const d = await api(`/api/v1/items?account=${encodeURIComponent(account)}&service=${service}&limit=${PAGE}&offset=${pageOffset}`);
  const items = d.items || [];
  document.getElementById("rows").insertAdjacentHTML("beforeend", rowsHtml(items));
  pageOffset += items.length;
  pageTotal = d.total ?? pageTotal;
  updateMore(pageOffset);
}
async function doSearch() {
  const q = document.getElementById("q").value.trim();
  if (!q) return loadItems();
  const d = await api(`/api/v1/search?account=${encodeURIComponent(account)}&q=${encodeURIComponent(q)}`);
  const hits = d.hits || [];
  document.getElementById("rows").innerHTML = hits.length ? rowsHtml(hits) : EMPTY_ROW;
  document.getElementById("more").hidden = true; // search results aren't paginated
}
function pickService(s) {
  service = s;
  document.getElementById("ov-btn").classList.remove("active");
  [...document.querySelectorAll("#services button")].forEach(b => b.classList.toggle("active", b.textContent === s));
  document.getElementById("overview").hidden = true;
  document.getElementById("browse").hidden = false;
  loadItems();
}
async function showOverview() {
  document.getElementById("ov-btn").classList.add("active");
  [...document.querySelectorAll("#services button")].forEach(b => b.classList.remove("active"));
  document.getElementById("browse").hidden = true;
  const ov = document.getElementById("overview");
  ov.hidden = false;
  if (!account) { ov.textContent = "No account configured."; return; }
  const [st, cfg, act] = await Promise.all([
    api(`/api/v1/status?account=${encodeURIComponent(account)}`),
    api("/api/v1/settings"),
    api(`/api/v1/activity?account=${encodeURIComponent(account)}&limit=10`),
  ]);
  const cards = (st.services || []).map(s =>
    `<div class="card"><div class="n">${s.items} <small>items</small></div>
     <div class="n" style="font-size:15px">${s.archived} <small>archived</small></div>
     <div class="l">${escapeHtml(s.service)}</div></div>`).join("")
    || `<div class="muted">No archived items yet.</div>`;
  const t = (st.totals || {}), sy = (cfg.sync || {}), dg = (sy.delete_guard || {});
  const acc = (cfg.accounts || []).find(a => a.id === account) || {};
  ov.innerHTML =
    `<h3>Archive overview</h3><div class="cards">${cards}</div>
     <h3>Totals</h3><div class="cards">
       <div class="card"><div class="n">${t.items ?? 0}</div><div class="l">total items</div></div>
       <div class="card"><div class="n">${t.archived ?? 0}</div><div class="l">archived bodies</div></div>
       <div class="card"><div class="n">${st.onedrive_cursor ? "yes" : "no"}</div><div class="l">OneDrive cursor</div></div>
     </div>
     <h3>Settings</h3><dl class="kv">
       <dt>Account</dt><dd>${escapeHtml(acc.username || account)}</dd>
       <dt>Sync root</dt><dd>${escapeHtml(acc.sync_root || "")}</dd>
       <dt>Archive root</dt><dd>${escapeHtml(acc.archive_root || "")}</dd>
       <dt>Trash retention</dt><dd>${sy.trash_retention_days ?? "?"} days</dd>
       <dt>Body index (FTS)</dt><dd>${sy.body_index ? "on" : "off"}</dd>
       <dt>Change source</dt><dd>${escapeHtml(sy.change_source || "?")}</dd>
       <dt>Delete guard</dt><dd>max ${dg.max_absolute ?? "?"} abs / ${dg.max_fraction ?? "?"} fraction (min ${dg.fraction_min_total ?? "?"})</dd>
     </dl>` + activityHtml(act.runs || []);
}
function activityHtml(runs) {
  if (!runs.length) return `<h3>Recent activity</h3><div class="muted">No runs recorded yet.</div>`;
  const rows = runs.map(r => {
    const ok = r.status === "ok";
    const dot = `<span style="color:${ok ? "#4ade80" : "#f87171"}">${ok ? "●" : "●"}</span>`;
    return `<tr><td>${dot}</td><td>${escapeHtml(r.kind)}</td>
      <td>${escapeHtml(r.summary)}</td><td class="muted">${escapeHtml(r.finished_at)}</td></tr>`;
  }).join("");
  return `<h3>Recent activity</h3><table><tbody>${rows}</tbody></table>`;
}
async function init() {
  document.getElementById("services").innerHTML =
    SERVICES.map(s => `<button onclick="pickService('${s}')">${s}</button>`).join("");
  const d = await api("/api/v1/accounts");
  const sel = document.getElementById("account");
  sel.innerHTML = (d.accounts || []).map(a => `<option value="${a.id}">${escapeHtml(a.username)}</option>`).join("");
  sel.onchange = () => { account = sel.value; document.getElementById("ov-btn").classList.contains("active") ? showOverview() : loadItems(); };
  if (d.accounts && d.accounts.length) { account = d.accounts[0].id; document.getElementById("acct").textContent = d.accounts[0].username; }
  showOverview();
}
init();
</script>
</body>
</html>
